name: CI

on:
  push:
    branches:
      - main
      - master
      - feat/*
      - fix/*
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Dependency health check
        run: python -m pip check

      - name: Syntax smoke check
        run: |
          python -m compileall ai app config core db evaluation intelligence mcp_server memory models

      - name: Run tests in tests folder
        shell: bash
        run: |
          if find tests -type f -name "test_*.py" -print -quit | grep -q .; then
            pytest -q tests
          else
            echo "No test files found in tests/. Skipping pytest."
          fi