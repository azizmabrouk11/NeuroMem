services: 
  neuromem:
    build: .
    container_name: neuromem
    ports:
      - "8000:8000"
    environment:
      LLM_PROVIDER: ollama
      EMBEDDING_PROVIDER: ollama
      OLLAMA_BASE_URL: http://ollama:11434/v1
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      MCP_ENABLED: "true"
    depends_on:
      - ollama
      - qdrant
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  label-studio:
    image: heartexlabs/label-studio:latest
    container_name: label-studio
    ports:
      - "8080:8080"
    volumes:
      - labelstudio_data:/label-studio/data
    restart: unless-stopped

volumes:
  ollama_data:
  qdrant_data:
  labelstudio_data:
